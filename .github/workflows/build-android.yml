name: Build Android AAB for Google Play

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android AAB via EAS
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"

      - name: Print download instructions
        run: |
          echo "=================================================="
          echo " BUILD SUBMITTED TO EAS!"
          echo " Your AAB is being built on Expo's cloud servers."
          echo ""
          echo " To download your AAB:"
          echo " 1. Go to: https://expo.dev/accounts/afterpay786/projects/after-pay/builds"
          echo " 2. Wait for the build to finish (20-30 minutes)"
          echo " 3. Click the green Download button"
          echo " 4. Upload the .aab file to Google Play Console"
          echo "=================================================="
